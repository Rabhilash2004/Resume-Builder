<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Resume Builder Premium</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <div class="auth-card glass">
    <h1>Welcome back</h1>
    <p>Log in to continue building your resume</p>

    <input id="email" type="email" placeholder="Email" class="input" />
    <input id="password" type="password" placeholder="Password" class="input" />

    <button class="primary-btn" onclick="login()">Login</button>

    <div class="auth-links">
      <a href="register.html">Create account</a>
      <a href="index.html">Back</a>
    </div>

    <div id="msg" class="message"></div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
